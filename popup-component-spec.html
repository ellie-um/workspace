<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POD SHOP 통합편집기 — 안내 팝업 컴포넌트 스펙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #F2F2F2; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const T = {
      bg: "#191919", white: "#fff", overlay: "rgba(0,0,0,0.55)",
      closeBg: "rgba(51,51,51,0.7)", green: "#3CC295", red: "#FF6B5C",
      divider: "rgba(119,119,119,0.2)", calloutBg: "#F5F5F5",
      calloutBorder: "#E0E0E0", font: "'Noto Sans KR', sans-serif",
    };

    function CheckIcon({ color = T.green }) {
      return (
        <div style={{ width:24,height:24,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
          <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
            <path d="M1 4.5L4 7.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      );
    }

    function CloseBtn({ onClick }) {
      return (
        <button onClick={onClick} style={{ width:32,height:32,borderRadius:"50%",background:T.closeBg,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
        </button>
      );
    }

    function CTABar({ label, isMobile }) {
      return (
        <div style={{ padding: isMobile ? "8px 16px 28px" : "8px 16px", background:T.white, borderTop:`1px solid ${T.divider}`, flexShrink:0 }}>
          <button style={{ width:"100%",height:48,borderRadius:100,background:T.bg,color:T.white,border:"none",cursor:"pointer",fontFamily:T.font,fontSize:14,fontWeight:500,letterSpacing:-0.5 }}>{label}</button>
        </div>
      );
    }

    function Callout({ items }) {
      return (
        <div style={{ background:T.calloutBg,border:`1px solid ${T.calloutBorder}`,borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:8 }}>
          {items.map((text,i) => (
            <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
              <span style={{ fontSize:13,lineHeight:"19px",flexShrink:0 }}>⚠️</span>
              <p style={{ fontSize:13,lineHeight:"19px",letterSpacing:-0.5,color:"#444",margin:0,fontFamily:T.font }}>{text}</p>
            </div>
          ))}
        </div>
      );
    }

    function FileTagRow({ tags }) {
      return (
        <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginTop:6 }}>
          {tags.map(tag => (
            <span key={tag} style={{ padding:"3px 10px",borderRadius:4,background:"#F0F0F0",border:`1px solid ${T.calloutBorder}`,fontSize:12,fontFamily:T.font,color:"#333",fontWeight:500 }}>{tag}</span>
          ))}
        </div>
      );
    }

    function CheckList({ items }) {
      return (
        <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
          {items.map((item,i) => (
            <div key={i} style={{ display:"flex",gap:12,alignItems:"flex-start" }}>
              <CheckIcon color={item.icon==="red"?T.red:T.green}/>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:15,fontWeight:700,lineHeight:"22px",letterSpacing:-0.5,margin:"0 0 3px",color:T.bg,fontFamily:T.font }}>{item.title}</p>
                <p style={{ fontSize:13,fontWeight:400,lineHeight:"19px",letterSpacing:-0.5,margin:0,color:"#555",fontFamily:T.font }}>{item.desc}</p>
                {item.tags && <FileTagRow tags={item.tags}/>}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ImageSlider({ count, activeIndex, onChangeIndex }) {
      return (
        <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
          <div style={{ position:"relative",borderRadius:10,overflow:"hidden",background:"#e8e8e8",aspectRatio:"16/10",border:`1px solid ${T.divider}`,display:"flex",alignItems:"center",justifyContent:"center" }}>
            <span style={{ fontSize:13,color:"#999",fontFamily:T.font }}>IMG {activeIndex+1} / {count}</span>
            <button onClick={() => onChangeIndex((activeIndex-1+count)%count)} style={{ position:"absolute",left:"calc(50% - 42px)",top:"50%",transform:"translateY(-50%)",background:"rgba(25,25,25,0.85)",border:"2px solid white",borderRadius:100,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M7 1L3 5L7 9" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
            <button onClick={() => onChangeIndex((activeIndex+1)%count)} style={{ position:"absolute",left:"calc(50% + 8px)",top:"50%",transform:"translateY(-50%)",background:"rgba(25,25,25,0.85)",border:"2px solid white",borderRadius:100,width:34,height:34,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center" }}>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 1L7 5L3 9" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </button>
          </div>
          <div style={{ display:"flex",gap:8 }}>
            {Array.from({length:count}).map((_,i) => (
              <button key={i} onClick={() => onChangeIndex(i)} style={{ flex:1,aspectRatio:"16/10",border:i===activeIndex?`1.5px solid ${T.bg}`:`1px solid ${T.divider}`,borderRadius:8,background:"#e8e8e8",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#aaa",fontFamily:T.font }}>IMG</button>
            ))}
          </div>
        </div>
      );
    }

    function ThumbnailGrid({ items, columns=2 }) {
      return (
        <div style={{ display:"grid",gridTemplateColumns:`repeat(${columns},1fr)`,gap:16 }}>
          {items.map((item,i) => (
            <div key={i} style={{ display:"flex",flexDirection:"column",gap:10 }}>
              <div style={{ borderRadius:10,background:"#e8e8e8",border:`1px solid ${T.divider}`,aspectRatio:"4/3",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#aaa",fontFamily:T.font }}>IMG</div>
              {item.title && <>
                <p style={{ fontSize:15,fontWeight:700,lineHeight:"22px",margin:0,color:T.bg,fontFamily:T.font }}>{item.title}</p>
                {item.bullets?.map((b,j) => (
                  <div key={j} style={{ display:"flex",gap:7,alignItems:"flex-start",marginTop:-4 }}>
                    <span style={{ width:3,height:3,borderRadius:"50%",background:T.bg,marginTop:8,flexShrink:0 }}/>
                    <p style={{ fontSize:13,lineHeight:"19px",color:"#555",margin:0,fontFamily:T.font }}>{b}</p>
                  </div>
                ))}
              </>}
            </div>
          ))}
        </div>
      );
    }

    function MobileShell({ onClose, ctaLabel, children }) {
      return (
        <div style={{ position:"fixed",inset:0,background:T.overlay,display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000 }}>
          <div style={{ background:T.white,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:390,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -4px 24px rgba(0,0,0,0.12)" }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"12px 16px 8px",flexShrink:0 }}>
              <CloseBtn onClick={onClose}/>
            </div>
            <div style={{ flex:1,overflowY:"auto",padding:"0 16px 16px" }}>{children}</div>
            <CTABar label={ctaLabel} isMobile/>
          </div>
        </div>
      );
    }

    function PCShell({ onClose, ctaLabel, children, width=480 }) {
      return (
        <div style={{ position:"fixed",inset:0,background:T.overlay,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:40 }}>
          <div style={{ background:T.white,borderRadius:24,width:"100%",maxWidth:width,maxHeight:"85vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.18)",position:"relative" }}>
            <div style={{ position:"absolute",top:14,right:14,zIndex:2 }}><CloseBtn onClick={onClose}/></div>
            <div style={{ flex:1,overflowY:"auto",padding:"40px 20px 0" }}>{children}</div>
            <CTABar label={ctaLabel}/>
          </div>
        </div>
      );
    }

    const CHECKLIST = [
      { icon:"green", title:"디자인을 단순하게 유지해 주세요.", desc:"너무 세밀한 문양은 자수 공정 중에 생략되거나 단순화될 수 있습니다." },
      { icon:"green", title:"굵은 선과 큰 글자를 권장합니다.", desc:"선 두께 1.3mm, 글자 높이 6.4mm 이상일 때 가장 선명하고 예쁘게 표현됩니다." },
      { icon:"green", title:"대비가 뚜렷한 단색을 사용해 주세요", desc:"실은 색을 섞을 수 없어 그라데이션이나 사진은 구현이 어렵습니다." },
      { icon:"red", title:"전문가의 손길로 더 완벽하게!", desc:"오프린트미 아티스트가 자수에 최적화된 시안으로 정성껏 조정해 드립니다." },
    ];

    function Head({ title, subtitle }) {
      return <>
        <h2 style={{ fontSize:22,fontWeight:700,lineHeight:"32px",letterSpacing:-0.5,margin:"0 0 8px",color:T.bg,fontFamily:T.font }}>{title}</h2>
        {subtitle && <p style={{ fontSize:15,fontWeight:500,lineHeight:"22px",letterSpacing:-0.5,color:"#555",margin:"0 0 20px",fontFamily:T.font }}>{subtitle}</p>}
      </>;
    }

    function ContentA({ isMobile }) {
      const [active, setActive] = useState(0);
      return <>
        <Head title="만드는 방법" subtitle="자수는 제품에 직접 수놓아집니다. 최상의 결과를 얻으려면 아래 만드는 방법을 참고해주세요." />
        {isMobile ? (
          <>
            <ImageSlider count={4} activeIndex={active} onChangeIndex={setActive}/>
            <div style={{ height:20 }}/>
            <CheckList items={CHECKLIST}/>
          </>
        ) : (
          <div style={{ display:"flex",gap:32 }}>
            <div style={{ flex:1 }}><CheckList items={CHECKLIST}/></div>
            <div style={{ width:480,flexShrink:0 }}><ImageSlider count={4} activeIndex={active} onChangeIndex={setActive}/></div>
          </div>
        )}
        <div style={{ height:24 }}/>
      </>;
    }

    function ContentB() {
      return <>
        <Head title="선명한 인쇄를 위한 가이드" subtitle="선명한 인쇄를 위해 아래 가이드를 확인해 주세요."/>
        <CheckList items={[
          { title:"업로드 권장 파일 형식", desc:"가장 선명한 결과를 위해 벡터 파일을 사용해 주세요.", tags:["AI","SVG","PDF","PNG","JPG"] },
          { title:"해상도 300dpi 이상 권장", desc:"저해상도 이미지는 인쇄 시 흐릿하게 출력될 수 있어요." },
          { title:"CMYK 색상 모드 권장", desc:"화면(RGB)과 인쇄(CMYK) 색상은 차이가 있을 수 있어요." },
        ]}/>
        <div style={{ marginTop:20 }}>
          <Callout items={["가능하면 벡터 파일(AI, SVG, PDF)로 업로드해 주세요. 가장 선명한 인쇄 결과를 얻을 수 있어요!"]}/>
        </div>
        <div style={{ height:24 }}/>
      </>;
    }

    function ContentC() {
      return <>
        <Head title="꼭 확인해주세요."/>
        <ThumbnailGrid columns={2} items={[
          { title:"앞면", bullets:["디자인한 이미지 그대로 인쇄돼요."] },
          { title:"뒷면 (좌우 반전)", bullets:["앞면 기준으로 좌우 반전 인쇄돼요.","텍스트 포함 시 거울처럼 반대로 보여요."] },
        ]}/>
        <div style={{ marginTop:16 }}>
          <Callout items={["배경이 투명한 PNG 파일을 사용하면 더 깔끔한 결과물을 얻을 수 있어요.","CMYK 색상 모드로 작업하면 화면과 인쇄물의 색상 차이를 줄일 수 있어요."]}/>
        </div>
        <div style={{ height:24 }}/>
      </>;
    }

    function ContentD() {
      return <>
        <Head title="입체 아크릴 코롯토 만드는 방법"/>
        <Callout items={["레이어 구조: 앞면 / 뒷면 레이어를 반드시 분리해서 작업해 주세요.","칼선은 별도 레이어에 작업하고, Pantone 색상을 권장합니다."]}/>
        <div style={{ marginTop:20 }}>
          <ThumbnailGrid columns={1} items={[
            { title:"Step 1. 디자인 파일 준비", bullets:["앞면, 뒷면, 칼선을 레이어로 구분해 주세요.","AI, PDF 형식으로 저장해 주세요."] },
            { title:"Step 2. 파일 업로드", bullets:["ZIP으로 압축 후 업로드하면 돼요.","각 면 최대 10MB 이하."] },
            { title:"Step 3. 시안 확인", bullets:["담당 아티스트가 시안을 검수해요.","수정 요청은 1회 무료 제공."] },
            { title:"Step 4. 최종 승인", bullets:["시안 확인 후 승인하면 제작 시작!"] },
          ]}/>
        </div>
        <div style={{ height:24 }}/>
      </>;
    }

    function ContentE() {
      return <>
        <Head title="포토카드 제작 안내"/>
        <div style={{ borderRadius:10,background:"#e8e8e8",border:`1px solid ${T.divider}`,aspectRatio:"4/3",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#aaa",fontFamily:T.font }}>이미지 영역 (디자이너 작업)</div>
        <p style={{ fontSize:15,fontWeight:500,lineHeight:"22px",margin:"12px 0 0",color:"#555",fontFamily:T.font }}>위 가이드 이미지를 참고하여 디자인해 주세요.</p>
        <div style={{ height:24 }}/>
      </>;
    }

    function SectionHeader({ emoji, title }) {
      return (
        <div style={{ display:"flex",alignItems:"center",gap:8,margin:"24px 0 12px",paddingBottom:10,borderBottom:`1px solid ${T.divider}` }}>
          <span style={{ fontSize:17 }}>{emoji}</span>
          <p style={{ fontSize:15,fontWeight:700,lineHeight:"22px",letterSpacing:-0.5,margin:0,color:T.bg,fontFamily:T.font }}>{title}</p>
        </div>
      );
    }

    function CheckItemF({ type="good", title, desc, tags }) {
      const iconMap = {
        good:    { bg:T.green,   el: <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg> },
        warning: { bg:"#F5A623", el: <svg width="11" height="10" viewBox="0 0 11 10" fill="none"><path d="M5.5 1L10 9H1L5.5 1Z" stroke="white" strokeWidth="1.6" strokeLinejoin="round"/><path d="M5.5 4.5V6.5" stroke="white" strokeWidth="1.5" strokeLinecap="round"/><circle cx="5.5" cy="7.8" r="0.6" fill="white"/></svg> },
        tip:     { bg:"#F5A623", el: <svg width="11" height="12" viewBox="0 0 11 12" fill="none"><path d="M5.5 1C3.29 1 1.5 2.79 1.5 5c0 1.44.77 2.7 1.9 3.4V9.5h4.2V8.4C8.73 7.7 9.5 6.44 9.5 5 9.5 2.79 7.71 1 5.5 1Z" stroke="white" strokeWidth="1.4" fill="none"/><path d="M3.5 11h4" stroke="white" strokeWidth="1.4" strokeLinecap="round"/></svg> },
      };
      const { bg, el } = iconMap[type];
      return (
        <div style={{ display:"flex",gap:12,alignItems:"flex-start" }}>
          <div style={{ width:24,height:24,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{el}</div>
          <div style={{ flex:1 }}>
            <p style={{ fontSize:15,fontWeight:700,lineHeight:"22px",letterSpacing:-0.5,margin:"0 0 3px",color:T.bg,fontFamily:T.font }}>{title}</p>
            {desc && <p style={{ fontSize:13,lineHeight:"19px",letterSpacing:-0.5,margin:0,color:"#555",fontFamily:T.font }}>{desc}</p>}
            {tags && (
              <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginTop:6 }}>
                {tags.map(tag => <span key={tag} style={{ padding:"3px 10px",borderRadius:4,background:"#F0F0F0",border:`1px solid ${T.calloutBorder}`,fontSize:12,fontFamily:T.font,color:"#333",fontWeight:500 }}>{tag}</span>)}
              </div>
            )}
          </div>
        </div>
      );
    }

    function BulletList({ items }) {
      return (
        <div style={{ display:"flex",flexDirection:"column",gap:6,margin:"0 0 12px" }}>
          {items.map((text,i) => (
            <div key={i} style={{ display:"flex",gap:8,alignItems:"flex-start" }}>
              <span style={{ width:3,height:3,borderRadius:"50%",background:"#555",marginTop:8,flexShrink:0 }}/>
              <p style={{ fontSize:13,lineHeight:"19px",letterSpacing:-0.5,margin:0,color:"#444",fontFamily:T.font }}>{text}</p>
            </div>
          ))}
        </div>
      );
    }

    function CalloutF({ type="warning", text }) {
      const icon = type === "tip" ? "💡" : "⚠️";
      return (
        <div style={{ display:"flex",gap:8,alignItems:"flex-start",background:T.calloutBg,border:`1px solid ${T.calloutBorder}`,borderRadius:10,padding:"10px 14px",marginBottom:8 }}>
          <span style={{ fontSize:14,flexShrink:0,lineHeight:"20px" }}>{icon}</span>
          <p style={{ fontSize:13,lineHeight:"19px",letterSpacing:-0.5,color:"#444",margin:0,fontFamily:T.font }}>{text}</p>
        </div>
      );
    }

    function ContentF() {
      return <>
        <Head title="이미지 업로드 가이드" subtitle="선명한 인쇄를 위해 아래 가이드를 확인해 주세요."/>
        <SectionHeader emoji="🖨️" title="파일 형식 및 사이즈"/>
        <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
          <CheckItemF type="good"    title="벡터 파일(AI, SVG, PDF)을 사용하면 어떤 크기로 인쇄해도 선명해요." />
          <CheckItemF type="warning" title="비트맵 파일(PNG, JPG)은 300 DPI 이상의 고해상도 파일을 사용해 주세요." />
          <CheckItemF type="tip"     title="파일 크기: 최대 50MB까지 업로드할 수 있어요." tags={["AI","SVG","PDF","PNG","JPG"]} />
        </div>
        <SectionHeader emoji="🔍" title="벡터 이미지 vs 비트맵 이미지"/>
        <BulletList items={[
          "벡터 이미지는 수학적 공식으로 이루어져 있어서, 아무리 크게 확대해도 선명하게 유지돼요.",
          "비트맵 이미지는 작은 점(픽셀)으로 이루어져 있어서, 확대하면 깨지고 흐려질 수 있어요.",
        ]}/>
        <div style={{ marginBottom:16 }}>
          <ThumbnailGrid columns={2} items={[
            { title:"✅ 벡터 (Vector)", bullets:["확대/축소해도 화질 유지","인쇄 결과물이 항상 선명","AI, SVG, PDF"] },
            { title:"✕ 비트맵 (Bitmap)", bullets:["확대 시 픽셀이 보여 깨짐","저해상도일수록 인쇄 품질 저하","PNG, JPG"] },
          ]}/>
        </div>
        <SectionHeader emoji="⚠️" title="파일 주의사항"/>
        <div style={{ marginBottom:16 }}>
          <ThumbnailGrid columns={2} items={[
            { title:"✅ 300 DPI (권장)", bullets:["선명한 인쇄 결과"] },
            { title:"✕ 72 DPI (비권장)", bullets:["인쇄 시 흐릿하게 출력"] },
          ]}/>
        </div>
        <CalloutF type="warning" text="저해상도 이미지(72 DPI 등)는 인쇄 시 흐릿하게 나올 수 있어요."/>
        <div style={{ marginBottom:16 }}>
          <ThumbnailGrid columns={2} items={[
            { title:"✅ 원본크기", bullets:["원본 크기 그대로 사용 권장"] },
            { title:"✕ 강제 확대", bullets:["억지로 키우면 깨질 수 있어요"] },
          ]}/>
        </div>
        <CalloutF type="warning" text="작은 이미지를 억지로 크게 늘리면 깨질 수 있어요. 원본 크기 그대로 사용해 주세요."/>
        <CalloutF type="tip"     text="배경이 투명한 PNG 파일을 사용하면 더 깔끔한 결과물을 얻을 수 있어요."/>
        <CalloutF type="tip"     text="CMYK 색상 모드로 작업하면 인쇄 결과물과 화면 색상의 차이를 줄일 수 있어요."/>
        <div style={{ height:24 }}/>
      </>;
    }

    const VARIANTS = [
      {
        id:"A", name:"체크리스트 + 이미지 슬라이더",
        moLayout:"이미지 슬라이더 상단 → 체크리스트 하단 (1컬럼 세로 스택)",
        pcLayout:"좌: 체크리스트 / 우: 이미지 슬라이더+썸네일 4장 (2컬럼)",
        when:"자수·인쇄 품질처럼 설명 많고 예시 이미지가 있는 경우",
        pcWidth:960, designerWork:"메인 이미지 N장 + 썸네일 4장",
        pmInput:"title · subtitle · checkItems(icon/title/desc, max 5) · imageCount · ctaLabel",
        ctaLabel:"만들기",
      },
      {
        id:"B", name:"체크리스트 + 파일태그 + 콜아웃",
        moLayout:"체크리스트 → 파일태그 → 콜아웃 (1컬럼 세로 스택)",
        pcLayout:"동일 구조 · 팝업 너비 480px",
        when:"업로드 형식·해상도 등 이미지 없이 텍스트로 충분한 경우",
        pcWidth:480, designerWork:"없음 (디자이너 작업 불필요)",
        pmInput:"title · subtitle · checkItems(title/desc/tags?) · calloutItems · ctaLabel",
        ctaLabel:"확인했습니다.",
      },
      {
        id:"C", name:"썸네일 2컬럼 비교 + 콜아웃",
        moLayout:"썸네일 2컬럼 → 콜아웃 (너비 390px 안에서 2컬럼 유지)",
        pcLayout:"동일 구조 · 팝업 너비 520px",
        when:"앞/뒤면 반전, before/after 비교가 필요한 경우",
        pcWidth:520, designerWork:"비교 이미지 2장 (비율 4:3)",
        pmInput:"title · thumbnailItems(title/bullets, max 2) · calloutItems · ctaLabel",
        ctaLabel:"확인했습니다.",
      },
      {
        id:"D", name:"상단 콜아웃 + 썸네일 그리드",
        moLayout:"콜아웃 → Step 이미지 1컬럼 세로 스택",
        pcLayout:"PC/MO 동일 구조 · 1컬럼 세로 스택 · 팝업 너비 480px",
        when:"아크릴·칼선 등 복잡한 제작 프로세스 안내",
        pcWidth:480, designerWork:"Step별 설명 이미지 2~4장",
        pmInput:"title · calloutItems · thumbnailItems(title/bullets, max 4) · ctaLabel",
        ctaLabel:"만들기",
      },
      {
        id:"E", name:"이미지 단독",
        moLayout:"이미지 1장 (4:3) + 캡션 텍스트 (1컬럼)",
        pcLayout:"동일 구조 · 팝업 너비 460px",
        when:"포토카드처럼 이미지 1장으로 설명이 완결되는 경우",
        pcWidth:460, designerWork:"가이드 이미지 1장 (비율 4:3 권장)",
        pmInput:"title · image(1장) · captionText(선택) · ctaLabel",
        ctaLabel:"확인했습니다.",
      },
      {
        id:"F", name:"멀티 섹션 (섹션헤더 + 혼합 콘텐츠 반복)",
        moLayout:"섹션 헤더 → [체크아이템 / 불릿 / 썸네일 / 콜아웃] 반복 · 내부 스크롤",
        pcLayout:"동일 1컬럼 구조 · 팝업 너비 560px · 내부 스크롤",
        when:"이미지 업로드 가이드처럼 다수 섹션 + 아이콘 3종 + 비교 이미지 + 콜아웃이 혼합된 장문 안내",
        pcWidth:560, designerWork:"섹션별 비교 썸네일 이미지 (2컬럼 쌍 단위 작업, 비율 4:3)",
        pmInput:"title · subtitle · sections[ { emoji, sectionTitle, checkItems?, bullets?, thumbnailPairs?, callouts[{type:warning|tip}] } ] · ctaLabel",
        ctaLabel:"확인",
      },
    ];

    const CONTENT_MAP = {
      A: (isMobile) => <ContentA isMobile={isMobile}/>,
      B: () => <ContentB/>,
      C: () => <ContentC/>,
      D: () => <ContentD/>,
      E: () => <ContentE/>,
      F: () => <ContentF/>,
    };

    function Label({ children, color="#999" }) {
      return <p style={{ fontSize:10,color,margin:"0 0 2px",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5 }}>{children}</p>;
    }

    function App() {
      const [open, setOpen] = useState(null);

      return (
        <div style={{ fontFamily:T.font,minHeight:"100vh",background:"#F2F2F2" }}>
          <div style={{ background:T.bg,padding:"18px 24px" }}>
            <p style={{ color:"#777",fontSize:10,margin:0,letterSpacing:1,textTransform:"uppercase" }}>POD SHOP 통합편집기</p>
            <h1 style={{ color:T.white,fontSize:17,fontWeight:700,margin:"4px 0 0",letterSpacing:-0.5 }}>안내 팝업 공통 컴포넌트 스펙</h1>
            <p style={{ color:"#666",fontSize:11,margin:"5px 0 0" }}>스냅스 · 오프린트미 · POD SHOP 공용 · Figma 분석 기반</p>
          </div>

          <div style={{ padding:"20px 20px 48px" }}>
            <div style={{ background:"#FFFBE6",border:"1px solid #FFD970",borderRadius:10,padding:"11px 14px",marginBottom:18,fontSize:12,color:"#7A5C00" }}>
              📌 <strong>PC / MO 버튼으로 각 디바이스 팝업을 미리볼 수 있어요.</strong><br/>
              <span style={{ fontSize:11,opacity:0.8 }}>디자이너는 이미지 작업만 → PM 기획서 작성 → 개발 직행</span>
            </div>

            <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
              {VARIANTS.map(v => (
                <div key={v.id} style={{ background:T.white,borderRadius:12,border:"1px solid #E4E4E4",boxShadow:"0 2px 6px rgba(0,0,0,0.04)",overflow:"hidden" }}>
                  <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",borderBottom:"1px solid #F0F0F0",background:"#FAFAFA" }}>
                    <div style={{ display:"flex",alignItems:"center",gap:9 }}>
                      <span style={{ background:T.bg,color:T.white,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:100,letterSpacing:0.5 }}>Variant {v.id}</span>
                      <span style={{ fontSize:13,fontWeight:700,color:T.bg }}>{v.name}</span>
                    </div>
                    <div style={{ display:"flex",gap:6 }}>
                      <button onClick={() => setOpen({id:v.id,mode:"pc"})} style={{ background:T.bg,color:T.white,border:"none",borderRadius:100,padding:"5px 12px",fontSize:11,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:4 }}>
                        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="1.5" width="10" height="7" rx="1" stroke="white" strokeWidth="1.2" fill="none"/><path d="M4 10.5H8M6 8.5V10.5" stroke="white" strokeWidth="1.2" strokeLinecap="round"/></svg>
                        PC
                      </button>
                      <button onClick={() => setOpen({id:v.id,mode:"mo"})} style={{ background:"#555",color:T.white,border:"none",borderRadius:100,padding:"5px 12px",fontSize:11,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:4 }}>
                        <svg width="9" height="11" viewBox="0 0 10 12" fill="none"><rect x="1" y="0.5" width="8" height="11" rx="1.5" stroke="white" strokeWidth="1.2" fill="none"/><circle cx="5" cy="9.5" r="0.7" fill="white"/></svg>
                        MO
                      </button>
                    </div>
                  </div>
                  <div style={{ padding:"12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 20px" }}>
                    <div><Label>PC 레이아웃</Label><p style={{ fontSize:12,color:"#444",margin:0 }}>{v.pcLayout}</p></div>
                    <div><Label color="#2563EB">MO 레이아웃</Label><p style={{ fontSize:12,color:"#444",margin:0 }}>{v.moLayout}</p></div>
                    <div><Label>사용 시점</Label><p style={{ fontSize:12,color:"#444",margin:0 }}>{v.when}</p></div>
                    <div><Label color="#D44">디자이너 작업 범위</Label><p style={{ fontSize:12,color:"#C33",margin:0,fontWeight:600 }}>{v.designerWork}</p></div>
                    <div style={{ gridColumn:"1/-1" }}>
                      <Label>PM 기획서 작성 항목</Label>
                      <p style={{ fontSize:11,color:"#555",margin:0,background:"#F5F5F5",padding:"6px 10px",borderRadius:6,fontFamily:"monospace" }}>{v.pmInput}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop:24,background:T.white,borderRadius:12,padding:"18px 18px 20px",border:"1px solid #E4E4E4" }}>
              <h2 style={{ fontSize:13,fontWeight:700,margin:"0 0 12px",color:T.bg }}>공통 정책 (Policy)</h2>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:9 }}>
                {[
                  ["팝업 진입 시점","편집기 특정 기능 진입 시 / 상품 최초 선택 시"],
                  ["재노출 정책","세션당 1회 기본 · \"다시 보지 않기\" 체크박스 옵션 추가 가능"],
                  ["닫기","X버튼 또는 CTA 버튼 클릭 시 닫힘"],
                  ["오버레이 클릭","닫힘 여부는 팝업 유형별 기획에서 정의"],
                  ["CTA 텍스트 규칙","제작 진입 → \"만들기\" / 안내 확인 → \"확인했습니다.\""],
                  ["모바일 진입 방식","바텀시트(bottom-sheet) · border-radius: 20px 20px 0 0"],
                  ["스크롤","콘텐츠 초과 시 내부 스크롤 (MO: 92vh / PC: 85vh)"],
                  ["다국어","텍스트만 교체 · 일본어는 폰트 별도 지정 필요"],
                ].map(([label,val]) => (
                  <div key={label} style={{ background:"#F8F8F8",borderRadius:8,padding:"8px 11px" }}>
                    <p style={{ fontSize:10,color:"#999",margin:"0 0 2px",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5 }}>{label}</p>
                    <p style={{ fontSize:11,color:"#333",margin:0 }}>{val}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {open?.mode==="pc" && (
            <PCShell onClose={() => setOpen(null)} ctaLabel={VARIANTS.find(v=>v.id===open.id)?.ctaLabel} width={VARIANTS.find(v=>v.id===open.id)?.pcWidth}>
              {CONTENT_MAP[open.id]?.(false)}
            </PCShell>
          )}
          {open?.mode==="mo" && (
            <MobileShell onClose={() => setOpen(null)} ctaLabel={VARIANTS.find(v=>v.id===open.id)?.ctaLabel}>
              {CONTENT_MAP[open.id]?.(true)}
            </MobileShell>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
